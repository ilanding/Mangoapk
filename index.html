<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APK Release Panel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00ccff;
    --danger: #ff4466;
    --text: #e0e0f0;
    --muted: #555577;
    --card: #13131f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb2 {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,204,255,0.05) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }

  /* LOGIN SCREEN */
  #login-screen {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 380px;
    padding: 20px;
    animation: fadeUp 0.5s ease both;
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .brand-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,204,255,0.1));
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 24px;
  }

  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .brand p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-group label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: var(--accent);
  }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover {
    background: #00ffaa;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,255,136,0.3);
  }

  .btn-primary:active { transform: translateY(0); }

  .error-msg {
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 14px;
    display: none;
  }

  /* MAIN PANEL */
  #main-panel {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 680px;
    padding: 20px;
    animation: fadeUp 0.5s ease both;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .panel-title span { color: var(--accent); }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card-title {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 16px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 500px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-row .input-group { flex: 1; margin-bottom: 0; }

  .save-btn {
    padding: 12px 18px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .save-btn:hover { background: rgba(0,255,136,0.1); }
  .save-btn.saved { background: rgba(0,255,136,0.15); color: var(--accent); }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,255,136,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon { font-size: 32px; margin-bottom: 10px; }

  .drop-text {
    font-size: 13px;
    color: var(--muted);
  }

  .drop-text strong { color: var(--text); }

  .file-selected {
    margin-top: 14px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .file-selected .fname { color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-selected .fsize { color: var(--muted); flex-shrink: 0; }

  /* Upload section */
  .upload-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #00ddaa);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .upload-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(0,255,136,0.35);
  }

  .upload-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Progress */
  .progress-wrap {
    display: none;
    margin-top: 16px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    background: var(--surface);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Status */
  .status-box {
    display: none;
    margin-top: 16px;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12px;
    line-height: 1.6;
  }

  .status-box.success {
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.25);
    color: var(--accent);
  }

  .status-box.error {
    background: rgba(255,68,102,0.08);
    border: 1px solid rgba(255,68,102,0.25);
    color: var(--danger);
  }

  /* Link box */
  .link-box {
    display: none;
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .link-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .link-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .link-url {
    flex: 1;
    font-size: 12px;
    color: var(--accent2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    word-break: break-all;
  }

  .copy-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: rgba(0,204,255,0.1); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* Warning strip */
  .warn-strip {
    background: rgba(255,180,0,0.06);
    border: 1px solid rgba(255,180,0,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    color: #ffb700;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb2"></div>


<!-- MAIN PANEL -->
<div id="main-panel">
  <div class="panel-header">
    <div class="panel-title">APK <span>Release</span> Panel</div>
  </div>

  <!-- Permanent Link Info -->
  <div class="card">
    <div class="card-title">Permanent Download Link</div>
    <div class="link-box" style="display:block; margin-top:0">
      <div class="link-label">🔗 Share this link — kabhi nahi badlega</div>
      <div class="link-row">
        <div class="link-url" id="static-link">https://github.com/iLanding/Mangoapk/releases/download/MParivahan/MParivahan.apk</div>
        <button class="copy-btn" id="copy-static-btn" onclick="copyStaticLink()">COPY</button>
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-title">Upload APK</div>

    <div class="drop-zone" id="drop-zone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept=".apk" onchange="handleFileSelect(event)"/>
      <div class="drop-icon">📱</div>
      <div class="drop-text"><strong>Click or drag APK here</strong><br/>Only .apk files</div>
    </div>

    <div class="file-selected" id="file-info" style="display:none">
      <span>📦</span>
      <span class="fname" id="file-name"></span>
      <span class="fsize" id="file-size"></span>
    </div>

    <div style="margin-top:16px">
      <button class="upload-btn" id="upload-btn" onclick="startUpload()" disabled>
        🚀 PUSH TO GITHUB RELEASE
      </button>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label">
        <span id="progress-msg">Uploading...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="status-box" id="status-box"></div>

    <div class="link-box" id="link-box">
      <div class="link-label">🔗 Permanent Download Link</div>
      <div class="link-row">
        <div class="link-url" id="link-url"></div>
        <button class="copy-btn" id="copy-btn" onclick="copyLink()">COPY</button>
      </div>
    </div>
  </div>
</div>

<script>


// ─── CONFIG (HARDCODED) ───────────────────────────────────────────────────────
const GH_CONFIG = {
  owner: "iLanding",
  repo: "Mangoapk",
  token: "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",
  apkname: "MParivahan.apk",
  tag: "MParivahan",
};

function copyStaticLink() {
  navigator.clipboard.writeText(document.getElementById("static-link").textContent).then(() => {
    const btn = document.getElementById("copy-static-btn");
    btn.textContent = "✓ COPIED";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "COPY"; btn.classList.remove("copied"); }, 2000);
  });
}



// ─── FILE SELECT ─────────────────────────────────────────────────────────────
let selectedFile = null;

function handleFileSelect(e) {
  const f = e.target.files[0];
  if (f) setFile(f);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById("drop-zone").classList.add("dragover");
}

function handleDragLeave() {
  document.getElementById("drop-zone").classList.remove("dragover");
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById("drop-zone").classList.remove("dragover");
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
}

function setFile(f) {
  selectedFile = f;
  document.getElementById("file-name").textContent = f.name;
  document.getElementById("file-size").textContent = (f.size / 1024 / 1024).toFixed(2) + " MB";
  document.getElementById("file-info").style.display = "flex";
  document.getElementById("upload-btn").disabled = false;
  // hide old status
  document.getElementById("status-box").style.display = "none";
  document.getElementById("link-box").style.display = "none";
}

// ─── UPLOAD LOGIC ────────────────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById("progress-wrap").style.display = "block";
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
  if (msg) document.getElementById("progress-msg").textContent = msg;
}

function showStatus(type, msg) {
  const box = document.getElementById("status-box");
  box.className = "status-box " + type;
  box.textContent = msg;
  box.style.display = "block";
}

function showLink(url) {
  document.getElementById("link-url").textContent = url;
  document.getElementById("link-box").style.display = "block";
}

function copyLink() {
  const url = document.getElementById("link-url").textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ COPIED";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "COPY"; btn.classList.remove("copied"); }, 2000);
  });
}

async function startUpload() {
  const cfg = GH_CONFIG;
  if (!selectedFile) {
    showStatus("error", "❌ APK file select karo!"); return;
  }

  document.getElementById("upload-btn").disabled = true;
  document.getElementById("status-box").style.display = "none";
  document.getElementById("link-box").style.display = "none";

  const BASE = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}`;
  const HEADERS = {
    "Authorization": `token ${cfg.token}`,
    "Accept": "application/vnd.github+json",
    "Content-Type": "application/json",
  };

  try {
    // STEP 1: Check existing release with same tag
    setProgress(10, "Checking existing release...");
    const listRes = await fetch(`${BASE}/releases`, { headers: HEADERS });
    if (!listRes.ok) throw new Error("Releases fetch failed: " + listRes.status);
    const releases = await listRes.json();
    const existing = releases.find(r => r.tag_name === cfg.tag);

    // STEP 2: Delete if exists
    if (existing) {
      setProgress(25, "Deleting old release...");
      const delRes = await fetch(`${BASE}/releases/${existing.id}`, {
        method: "DELETE", headers: HEADERS
      });
      if (!delRes.ok) throw new Error("Delete release failed: " + delRes.status);

      // Also delete the tag
      setProgress(35, "Deleting old tag...");
      await fetch(`${BASE}/git/refs/tags/${cfg.tag}`, {
        method: "DELETE", headers: HEADERS
      });
      // Don't throw if tag delete fails, continue
    }

    // STEP 3: Create new release
    setProgress(45, "Creating new release...");
    const createRes = await fetch(`${BASE}/releases`, {
      method: "POST",
      headers: HEADERS,
      body: JSON.stringify({
        tag_name: cfg.tag,
        name: cfg.tag,
        body: `APK updated on ${new Date().toLocaleString("en-IN", {timeZone:"Asia/Kolkata"})}`,
        draft: false,
        prerelease: false,
      })
    });
    if (!createRes.ok) {
      const err = await createRes.json();
      throw new Error("Create release failed: " + (err.message || createRes.status));
    }
    const release = await createRes.json();

    // STEP 4: Upload APK asset
    setProgress(55, "Uploading APK...");
    const uploadUrl = release.upload_url.replace("{?name,label}", "");
    const fileBuffer = await selectedFile.arrayBuffer();

    // Use XHR for progress tracking
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", `${uploadUrl}?name=${encodeURIComponent(cfg.apkname)}`);
      xhr.setRequestHeader("Authorization", `token ${cfg.token}`);
      xhr.setRequestHeader("Content-Type", "application/vnd.android.package-archive");
      xhr.setRequestHeader("Accept", "application/vnd.github+json");

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round(55 + (e.loaded / e.total) * 40);
          setProgress(pct, `Uploading APK... ${(e.loaded/1024/1024).toFixed(1)}/${(e.total/1024/1024).toFixed(1)} MB`);
        }
      };

      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve();
        else reject(new Error("Upload failed: " + xhr.status + " " + xhr.responseText));
      };
      xhr.onerror = () => reject(new Error("Network error during upload"));
      xhr.send(fileBuffer);
    });

    setProgress(100, "Done!");

    const downloadLink = `https://github.com/${cfg.owner}/${cfg.repo}/releases/download/${cfg.tag}/${cfg.apkname}`;
    showStatus("success", `✅ APK successfully pushed to GitHub Release!\nTag: ${cfg.tag} | File: ${cfg.apkname}`);
    showLink(downloadLink);

  } catch (err) {
    showStatus("error", "❌ Error: " + err.message);
  } finally {
    document.getElementById("upload-btn").disabled = false;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById("main-panel").style.display = "block";
};
</script>
</body>
</html>
